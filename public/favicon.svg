<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#0d1f45"/>
  <!-- Plate (ellipse) -->
  <ellipse cx="32" cy="40" rx="22" ry="7" fill="none" stroke="#a8c0e8" stroke-width="2"/>
  <ellipse cx="32" cy="40" rx="17" ry="5" fill="rgba(168,192,232,0.08)" stroke="#a8c0e8" stroke-width="1" stroke-dasharray="2 1"/>
  <!-- Fish body -->
  <ellipse cx="31" cy="28" rx="11" ry="6" fill="#4a72c4"/>
  <!-- Fish tail -->
  <polygon points="43,28 50,22 50,34" fill="#4a72c4"/>
  <!-- Fish belly highlight -->
  <ellipse cx="29" cy="30" rx="7" ry="3" fill="rgba(168,192,232,0.3)"/>
  <!-- Eye -->
  <circle cx="22" cy="26" r="1.8" fill="#f0f6ff"/>
  <circle cx="22" cy="26" r="0.9" fill="#08142e"/>
  <!-- Fin -->
  <path d="M28 22 Q32 18 36 22" fill="none" stroke="#a8c0e8" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Plate shadow line -->
  <ellipse cx="32" cy="40" rx="22" ry="7" fill="none" stroke="rgba(168,192,232,0.25)" stroke-width="3"/>
</svg>
